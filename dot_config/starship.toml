"$schema" = 'https://starship.rs/config-schema.json'

format = """
[оӮ¶](white)\
$os\
$username\
$hostname\
[оӮ°](bg:peach fg:white)\
$directory\
[оӮ°](bg:yellow fg:peach)\
$git_branch\
$git_status\
[оӮ°](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[оӮ°](fg:green bg:sapphire)\
$conda\
[оӮ°](fg:sapphire bg:gray)\
$time\
[оӮҙ ](fg:gray)\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_frappe'

[palettes.custom]
white = "#ffffff"

[os]
disabled = false
style = "bg:white fg:crust"

[os.symbols]
Windows = "оңҸ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
AOSC = "пҢҒ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"

[username]
show_always = true
style_user = "bg:white fg:crust"
style_root = "bg:white fg:crust"
format = '[ $user]($style)'

[hostname]
ssh_only = true
style = "bg:white fg:crust"
ssh_symbol = '\((SSH)\)'
format = '[@$hostname $ssh_symbol]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "

[git_branch]
symbol = "пҗҳ"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "оҳһ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "оү– "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "оҳҙ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "оҳҹ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "оҳҶ"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "пҢҲ"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[conda]
symbol = " п„Ң "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:gray"
format = '[[ пҗә $time ](fg:crust bg:gray)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[вқҜ](bold fg:green)'
error_symbol = '[вқҜ](bold fg:red)'
vimcmd_symbol = '[вқ®](bold fg:green)'
vimcmd_replace_one_symbol = '[вқ®](bold fg:gray)'
vimcmd_replace_symbol = '[вқ®](bold fg:gray)'
vimcmd_visual_symbol = '[вқ®](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "о«ҙ in $duration "
style = "bg:gray"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo = "#eebebe"
pink = "#f4b8e4"
mauve = "#ca9ee6"
red = "#e78284"
maroon = "#ea999c"
peach = "#ef9f76"
yellow = "#e5c890"
green = "#a6d189"
teal = "#81c8be"
sky = "#99d1db"
sapphire = "#85c1dc"
blue = "#8caaee"
gray = "#979797"
text = "#c6d0f5"
subtext1 = "#b5bfe2"
subtext0 = "#a5adce"
overlay2 = "#949cbb"
overlay1 = "#838ba7"
overlay0 = "#737994"
surface2 = "#626880"
surface1 = "#51576d"
surface0 = "#414559"
base = "#303446"
mantle = "#292c3c"
crust = "#232634"